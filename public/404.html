<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var appRoot = window.location.pathname.replace(/\/[^/]*$/, '/')
        var redirectTarget =
          window.location.pathname + window.location.search + window.location.hash

        window.sessionStorage.setItem('spa-redirect-path', redirectTarget)
        window.location.replace(appRoot)
      })()
    </script>
  </head>
  <body></body>
</html>
